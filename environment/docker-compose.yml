services:

  # =================================
  # MinIO: Object Storage
  # Console: http://localhost:9001
  # API:     http://localhost:9000
  # =================================

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ======================================================
  # MinIO Init: creates the taxi bucket on first startup
  # ======================================================

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: minio-init
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/taxi &&
        echo 'Bucket ready.'"

  # =========================================
  # Apache Spark - master node
  # Web UI: http://localhost:8080
  # =========================================

  spark-master:
      build:
        context: ..
        dockerfile: environment/Dockerfile.spark
      container_name: spark-master
      environment:
        - SPARK_NO_DAEMONIZE=true
      command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      ports:
        - "8080:8080"
        - "7077:7077"
      volumes:
        - ../pipeline:/opt/pipeline
        - ../config:/opt/config
        - ../data:/opt/data
        - ../environment/.env:/opt/environment/.env

  # =========================================
  # Apache Spark - worker node
  # =========================================

  spark-worker:
      build:
        context: ..
        dockerfile: environment/Dockerfile.spark
      container_name: spark-worker
      environment:
        - SPARK_NO_DAEMONIZE=true
      command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
      depends_on:
        - spark-master
      volumes:
        - ../pipeline:/opt/pipeline
        - ../config:/opt/config
        - ../data:/opt/data
        - ../environment/.env:/opt/environment/.env

  # =========================================
  # FastAPI - analytical API server
  # Docs: http://localhost:8000/docs
  # =========================================

  api:
    build:
      context: ..
      dockerfile: environment/Dockerfile.api
    container_name: fastapi
    ports:
      - "8000:8000"
    volumes:
      - ../api:/app/api
      - ../data:/app/data
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    depends_on:
      minio:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # =========================================
  # Streamlit - gold layer dashboard
  # URL: http://localhost:8501
  # =========================================

  dashboard:
    build:
      context: ..
      dockerfile: environment/Dockerfile.dashboard
    container_name: streamlit
    ports:
      - "8501:8501"
    volumes:
      - ../dashboard:/app/dashboard
      - ../data:/app/data
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    depends_on:
      minio:
        condition: service_healthy
    command: streamlit run dashboard/app.py --server.address 0.0.0.0

volumes:
  minio_data: